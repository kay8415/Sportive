name: Sportive workflow - Cloudflare R2

on:
  schedule:
    # Run every 2 days at 12:30 AM UTC (same as original)
    - cron: '30 0 */2 * *'

  workflow_dispatch:
    inputs:
      category:
        description: 'Select category to scrape'
        required: true
        type: choice
        default: 'all'
        options:
          - all
          - sports_toys
          - under_5
          - water_beverages

jobs:
  scrape:
    runs-on: ubuntu-22.04

    strategy:
      fail-fast: false
      matrix:
        category:
          - name: sports_toys
            display_name: Sports & Toys
          - name: under_5
            display_name: Under 5 KWD
          - name: water_beverages
            display_name: Water & Beverages

    name: Scrape ${{ matrix.category.display_name }}

    steps:
      - name: Check if should run
        id: should_run
        run: |
          if [[ "${{ github.event_name }}" == "schedule" ]] || \
             [[ "${{ inputs.category }}" == "all" ]] || \
             [[ "${{ inputs.category }}" == "${{ matrix.category.name }}" ]]; then
            echo "run=true" >> $GITHUB_OUTPUT
          else
            echo "run=false" >> $GITHUB_OUTPUT
          fi

      - name: Checkout code
        if: steps.should_run.outputs.run == 'true'
        uses: actions/checkout@v4

      - name: Set up Python
        if: steps.should_run.outputs.run == 'true'
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        if: steps.should_run.outputs.run == 'true'
        run: |
          cd CF/${{ matrix.category.name }}
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browsers
        if: steps.should_run.outputs.run == 'true'
        run: |
          playwright install chromium
          playwright install-deps chromium

      - name: Run scraper
        if: steps.should_run.outputs.run == 'true'
        env:
          CF_R2_ACCESS_KEY_ID: ${{ secrets.CF_R2_ACCESS_KEY_ID }}
          CF_R2_SECRET_ACCESS_KEY: ${{ secrets.CF_R2_SECRET_ACCESS_KEY }}
          CF_R2_BUCKET_NAME: ${{ secrets.CF_R2_BUCKET_NAME }}
          CF_R2_ENDPOINT_URL: ${{ secrets.CF_R2_ENDPOINT_URL }}
          MAX_CONCURRENT_SUBCATEGORIES: 3
        run: |
          cd CF/${{ matrix.category.name }}
          python scraper.py

      - name: Upload artifacts (backup)
        uses: actions/upload-artifact@v4
        if: steps.should_run.outputs.run == 'true' && always()
        with:
          name: ${{ matrix.category.name }}-results
          path: |
            CF/${{ matrix.category.name }}/data/*.xlsx
            CF/${{ matrix.category.name }}/data/images/*.jpg
            CF/${{ matrix.category.name }}/data/images/*.png
            CF/${{ matrix.category.name }}/data/images/*.gif
            CF/${{ matrix.category.name }}/data/images/*.webp
          retention-days: 7

      - name: Notify on failure
        if: steps.should_run.outputs.run == 'true' && failure()
        run: |
          echo "Scraping job for ${{ matrix.category.display_name }} failed! Check the logs."
